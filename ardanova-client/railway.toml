[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.args]
SKIP_ENV_VALIDATION = "true"

[deploy]
numReplicas = 1
healthcheckPath = "/api/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway will inject PORT automatically
# Set these in Railway dashboard or via CLI:
# - DATABASE_URL (use Railway's Postgres plugin - same as API)
# - API_URL (server-side backend origin; private Railway networking is preferred)
# - API_KEY (same random 32+ byte key as API service)
# - ADMIN_API_KEY (distinct random 32+ byte key; same value as API service)
# - ACTOR_ASSERTION_HMAC_KEY (32+ bytes; the exact same sealed value on frontend and API)
# - AUTH_SECRET (generate with: openssl rand -base64 32)
# - AUTH_URL (your client's public URL)
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# Never configure DEV_AUTH_BYPASS or NODE_TLS_REJECT_UNAUTHORIZED on Railway.
