# ============================================
# ArdaNova Railway Deployment Guide
# ============================================
#
# This is a monorepo with two coupled services:
# 1. ardanova-backend-api-mcp/ - .NET API
# 2. ardanova-client/ - Next.js 15 Frontend
#
# SHARED ENVIRONMENT:
# ------------------
# Both services share a root .env file locally.
# On Railway, use shared variables or reference between services.
#
# DEPLOYMENT STEPS:
# -----------------
#
# 1. Create a new Railway project
#
# 2. Add PostgreSQL database:
#    - Click "New" -> "Database" -> "PostgreSQL"
#    - Railway provides DATABASE_URL automatically
#
# 3. Run the "ArdaNova release artifacts" GitHub workflow for a reviewed
#    commit. Retain the exact API and client digest references from its manifest.
#
# 4. Add API Service (name it "ardanova-api"):
#    - Choose "Docker Image" and use the exact
#      ghcr.io/escherbridge/ardanova-api@sha256:<digest> reference.
#    - Add environment variables:
#      * DATABASE_URL = ${{Postgres.DATABASE_URL}}
#        (the API converts Railway's PostgreSQL URL at startup)
#      * API_KEY = <generate-secure-key>
#      * ADMIN_API_KEY = <same distinct random 32+ byte key as client>
#      * ACTOR_ASSERTION_HMAC_KEY = <same sealed 32+ byte key as client>
#
# 5. Add Client Service (name it "ardanova-client") after the API is ready:
#    - Choose "Docker Image" and use the paired
#      ghcr.io/escherbridge/ardanova-client@sha256:<digest> reference.
#    - Add environment variables:
#      * DATABASE_URL = ${{Postgres.DATABASE_URL}}
#      * API_URL = http://${{ardanova-api.RAILWAY_PRIVATE_DOMAIN}}:8080
#      * API_KEY = <same-key-as-api-service>
#      * ADMIN_API_KEY = <same distinct random 32+ byte key as API>
#      * ACTOR_ASSERTION_HMAC_KEY = <same sealed 32+ byte key as API>
#      * AUTH_SECRET = <generate: openssl rand -base64 32>
#      * AUTH_URL = https://${{RAILWAY_PUBLIC_DOMAIN}}
#      * GOOGLE_CLIENT_ID = <your-google-client-id>
#      * GOOGLE_CLIENT_SECRET = <your-google-client-secret>
#    Never set DEV_AUTH_BYPASS or NODE_TLS_REJECT_UNAUTHORIZED on Railway.
#
# 6. Generate domain for client service (this is your public URL)
#
# Production migrations are a separate protected operator procedure. Follow
# documentation/GATED_COMMERCE_MIGRATION_RUNBOOK.md; ordinary Git pushes never
# touch the production database, and baseline resolution is never automatic.
# Never use railway up, FTP, source upload, or mutable image tags for release.
#
# PRIVATE NETWORKING:
# ------------------
# Railway provides private networking between services.
# Use RAILWAY_PRIVATE_DOMAIN for internal API calls (faster, no egress costs)
#
# LOCAL DEVELOPMENT:
# -----------------
# 1. Copy .env.example to .env and fill in values
# 2. Run: docker-compose up -d
#
# This starts API and Client using the shared .env. DATABASE_URL must point to
# a reachable PostgreSQL instance; the compose file does not create one.
