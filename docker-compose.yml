version: '3.8'

# Uses .env file from root directory
# Copy .env.example to .env and fill in values

services:

  # .NET Backend API
  api:
    build:
      context: ./ardanova-backend-api-mcp
      dockerfile: Dockerfile
    container_name: ardanova-api
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      # Uses DATABASE_URL and API_KEY directly from .env (auto-converts postgres URL)
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Next.js Client
  client:
    build:
      context: ./ardanova-client
      dockerfile: Dockerfile
      args:
        - SKIP_ENV_VALIDATION=true
    container_name: ardanova-client
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=http://api:8080
      - API_KEY=${API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
