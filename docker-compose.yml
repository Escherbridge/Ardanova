version: '3.8'

# ===========================================
# ArdaNova Platform - Docker Compose
# ===========================================
# Uses .env file from root directory
# Copy .env.example to .env and fill in values

services:

  # ===========================================
  # .NET Backend API
  # ===========================================
  api:
    build:
      context: ./ardanova-backend-api-mcp
      dockerfile: Dockerfile
    container_name: ardanova-api
    env_file:
      - .env
    environment:
      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      # Database (auto-converts postgres URL to .NET format)
      - DATABASE_URL=${DATABASE_URL}
      # API Security
      - API_KEY=${API_KEY}
      # Storage Configuration
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-Local}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-ardanova-files}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_SERVICE_URL=${S3_SERVICE_URL:-}
      - S3_USE_PATH_STYLE=${S3_USE_PATH_STYLE:-false}
      - LOCAL_STORAGE_PATH=${LOCAL_STORAGE_PATH:-/app/uploads}
      - LOCAL_STORAGE_BASE_URL=${LOCAL_STORAGE_BASE_URL:-http://localhost:8080/files}
    ports:
      - "8080:8080"
    volumes:
      # Mount local uploads directory for development
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ===========================================
  # Next.js Client (Frontend)
  # ===========================================
  client:
    build:
      context: ./ardanova-client
      dockerfile: Dockerfile
      args:
        - SKIP_ENV_VALIDATION=true
    container_name: ardanova-client
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=http://api:8080
      - API_KEY=${API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ===========================================
  # AI Orchestrator Service (Claude/MCP)
  # ===========================================
  ai-orchestrator:
    build:
      context: ./ardanova-ai-client
      dockerfile: Dockerfile
    container_name: ardanova-ai
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://api:8080
      - API_KEY=${API_KEY}
      - PORT=8081
      - DEBUG=${DEBUG:-false}
    ports:
      - "8081:8081"
    depends_on:
      api:
        condition: service_healthy

  # ===========================================
  # MinIO (Optional - Local S3-Compatible Storage)
  # ===========================================
  # Uncomment to use MinIO for local S3 development
  # minio:
  #   image: minio/minio:latest
  #   container_name: ardanova-minio
  #   command: server /data --console-address ":9001"
  #   environment:
  #     - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
  #     - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   volumes:
  #     - minio_data:/data
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 20s
  #     retries: 3

